services:
  - type: web
    name: promptshield
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
```

**Step 2 — Also delete the .python-version file** (it's conflicting):
```
del .python-version
```

**Step 3 — Push:**
```
git add .
git commit -m "fix: set Python 3.11.0 directly in render.yaml"
git push 
